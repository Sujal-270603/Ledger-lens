# version is obsolete
services:

  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ledgerlens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ledgerlens}
      POSTGRES_USER:     ${POSTGRES_USER:-ledgerlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledgerlens_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ledgerlens}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ledgerlens_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Backend ───────────────────────────────────────────
  backend:
    build:
      context:    .
      dockerfile: Dockerfile
    container_name: ledgerlens_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:              ${NODE_ENV:-development}
      DATABASE_URL:          ${DATABASE_URL}
      REDIS_URL:             ${REDIS_URL:-redis://redis:6379}
      REDIS_HOST:            ${REDIS_HOST:-redis}
      REDIS_PORT:            ${REDIS_PORT:-6379}
      JWT_SECRET:            ${JWT_SECRET}
      JWT_REFRESH_SECRET:    ${JWT_REFRESH_SECRET}
      AWS_REGION:            ${AWS_REGION}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET:         ${AWS_S3_BUCKET}
      AWS_SQS_QUEUE_URL:     ${AWS_SQS_QUEUE_URL}
      GEMINI_API_KEY:        ${GEMINI_API_KEY}
      INTERNAL_API_KEY:      ${INTERNAL_API_KEY:-dev-internal-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node prisma/seed.js &&
        node dist/server.js
      "
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 60s

  # ── Worker ────────────────────────────────────────────
  worker:
    build:
      context:    .
      dockerfile: Dockerfile.worker
    container_name: ledgerlens_worker
    restart: unless-stopped
    environment:
      NODE_ENV:              ${NODE_ENV:-development}
      DATABASE_URL:          ${DATABASE_URL}
      REDIS_URL:             ${REDIS_URL:-redis://redis:6379}
      REDIS_HOST:            ${REDIS_HOST:-redis}
      REDIS_PORT:            ${REDIS_PORT:-6379}
      AWS_REGION:            ${AWS_REGION}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET:         ${AWS_S3_BUCKET}
      AWS_SQS_QUEUE_URL:     ${AWS_SQS_QUEUE_URL}
      GEMINI_API_KEY:        ${GEMINI_API_KEY}
      INTERNAL_API_KEY:      ${INTERNAL_API_KEY:-dev-internal-key}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
