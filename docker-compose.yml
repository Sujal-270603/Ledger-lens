version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ledgerlens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ledgerlens
      POSTGRES_USER:     ledgerlens
      POSTGRES_PASSWORD: ledgerlens_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerlens"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ledgerlens_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── LocalStack (AWS SQS + S3 locally) ─────────────────
  localstack:
    image: localstack/localstack:latest
    container_name: ledgerlens_localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES:        s3,sqs
      DEFAULT_REGION:  ap-south-1
      DATA_DIR:        /var/lib/localstack
      DOCKER_HOST:     unix:///var/run/docker.sock
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-setup.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout:  5s
      retries:  10

  # ── Backend ───────────────────────────────────────────
  backend:
    build:
      context:    .
      dockerfile: Dockerfile
    container_name: ledgerlens_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:              development
      DATABASE_URL:          postgresql://ledgerlens:ledgerlens_dev_password@postgres:5432/ledgerlens
      REDIS_URL:             redis://redis:6379
      JWT_SECRET:            dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET:    dev-refresh-secret-change-in-production
      AWS_REGION:            ap-south-1
      AWS_ACCESS_KEY_ID:     test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET:         ledgerlens-documents
      AWS_SQS_QUEUE_URL:     http://localstack:4566/000000000000/ledgerlens-processing.fifo
      GEMINI_API_KEY:        ${GEMINI_API_KEY}
      INTERNAL_API_KEY:      dev-internal-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma db seed &&
        node dist/server.js
      "
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 60s

  # ── Worker ────────────────────────────────────────────
  worker:
    build:
      context:    .
      dockerfile: Dockerfile.worker
    container_name: ledgerlens_worker
    restart: unless-stopped
    environment:
      NODE_ENV:              development
      DATABASE_URL:          postgresql://ledgerlens:ledgerlens_dev_password@postgres:5432/ledgerlens
      REDIS_URL:             redis://redis:6379
      AWS_REGION:            ap-south-1
      AWS_ACCESS_KEY_ID:     test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_BUCKET:         ledgerlens-documents
      AWS_SQS_QUEUE_URL:     http://localstack:4566/000000000000/ledgerlens-processing.fifo
      GEMINI_API_KEY:        ${GEMINI_API_KEY}
      INTERNAL_API_KEY:      dev-internal-key
    depends_on:
      backend:
        condition: service_healthy

  # ── Frontend ──────────────────────────────────────────
  frontend:
    build:
      context:    ../Frontend
      dockerfile: Dockerfile
    container_name: ledgerlens_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: /api/v1
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  localstack_data:
